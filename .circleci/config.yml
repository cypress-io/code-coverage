# https://circleci.com/docs/2.0/configuration-reference/
version: 2.1
orbs:
  # https://github.com/cypress-io/circleci-orb
  cypress: cypress-io/cypress@6.0.0 # used to run e2e tests
  win: circleci/windows@5.1.1 # run a test job on Windows

jobs:
  lint:
    description: Checks the code formatting
    docker:
      - image: cimg/node:22.14.0
        environment:
          # we don't need Cypress to check code style
          CYPRESS_INSTALL_BINARY: '0'
    steps:
      - attach_workspace:
          at: ~/
      - run:
          name: Code style check 🧹
          command: npm run format:check
      - run: npm run check:markdown
  
  install_and_persist:
    executor: cypress/default
    steps:
      - cypress/install
      - run: npm run check:markdown
      - persist_to_workspace:
          paths:
              - .cache/Cypress
              - project
          root: ~/

  windows_test:
    executor:
      # executor comes from the "windows" orb
      name: win/default
      shell: bash.exe
    steps:
      - checkout
      - run:
          name: Install node 22
          command: nvm install 22
      - run:
          name: Use node 22
          command: nvm use 22
      - run:
          name: Install deps for code coverage
          command: npm ci
      - run:
          name: Build project
          command: npm run build
      - run:
          name: Install test app deps
          command: npm i
          working_directory: test-apps/all-files
      - cypress/run-tests:
          # no-workspace: true
          start-command: npm run start:windows --prefix test-apps/all-files
          # wait-on: 'http://localhost:1234'
          cypress-command: npx cypress run --project test-apps/all-files
          # store screenshots and videos
          # store_artifacts: true          
      - run:
          # make sure the examples captures 100% of code
          name: Verify Code Coverage
          command: npm run coverage:verify
          working_directory: test-apps/all-files
      - run:
          name: Check code coverage files 📈
          # we will check the final coverage report
          # to make sure it only has files we are interested in
          # because there are files covered at 0 in the report
          command: npm i -D check-code-coverage && npm run coverage:check-files
          working_directory: test-apps/all-files

  build-dist:
    docker:
      - image: cimg/node:22.14.0
    steps:
      - attach_workspace:
          at: ~/
      - run: npm run build
      - persist_to_workspace:
          paths:
            - project/dist
          root: ~/

  publish:
    description: Publishes the new version of the plugin to NPM
    docker:
      - image: cimg/node:22.14.0
    environment:
      # we don't need Cypress to do the release
      CYPRESS_INSTALL_BINARY: '0'
      # trick semantic-release into thinking this is NOT a pull request
      # (under the hood the module env-ci is used to check if this is a PR)
      CIRCLE_PR_NUMBER: ''
      CIRCLE_PULL_REQUEST: ''
      CI_PULL_REQUEST: ''
    steps:
      - attach_workspace:
          at: ~/
      - run: npm run semantic-release

  verify-test-apps:
    docker:
      - image: cypress/base:22.14.0
    parameters:
      app:
        type: string
    steps:
      - attach_workspace:
          at: ~/
      - run:
          working_directory: test-apps/<< parameters.app >>
          command: npm i
      - run:
          command: npm run test
          working_directory: test-apps/<< parameters.app >>
      - store_artifacts:
          path: test-apps/<< parameters.app >>/coverage
      - run:
          name: Verify Code Coverage
          command: npm run coverage:verify
          working_directory: test-apps/<< parameters.app >>
      - run:
          name: Check code coverage files 📈
          # we will check the final coverage report
          # to make sure it only has files we are interested in
          # because there are files covered at 0 in the report
          command: npm run coverage:check-files
          working_directory: test-apps/<< parameters.app >>

  unit-test:
    docker:
      - image: cypress/base:24.11.0
    steps:
      - attach_workspace:
          at: ~/
      - run:
          command: npm run test
      - store_artifacts:
          path: coverage

workflows:
  build:
    jobs:
      - install_and_persist
      - lint:
          requires:
            - install_and_persist
      - unit-test:
          requires:
            - install_and_persist
      - build-dist:
          requires:
            - lint
            - unit-test
      - verify-test-apps:
          requires:
            - build-dist
          matrix:
            parameters:
              app:
                - all-files
                - backend
                - batch-send-coverage
                - before-all-visit
                - before-each-visit
                - esm-example
                - exclude-files
                - frontend
                - fullstack
                - multiple-backends
                - one-spec
                - same-folder
                - support-files
                - ts-example
                - unit-tests-js
                - use-webpack
                - redirect
      - windows_test:
          requires:
            - build-dist
      - publish:
          context: org-npm-credentials
          filters:
            branches:
              only:
                - master
                - beta
                - next
                - dev
          requires:
            - verify-test-apps
            - windows_test
